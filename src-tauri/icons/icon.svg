<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c1222"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <!-- Stream gradients -->
    <linearGradient id="s1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="s2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="s3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#60a5fa" stop-opacity="0.4"/>
    </linearGradient>
    <!-- Glow for the convergence point -->
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <!-- Dot gradient -->
    <radialGradient id="dot" cx="0.4" cy="0.35" r="0.6">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </radialGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bg)"/>

  <!-- Subtle grid/texture lines for depth -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="1" fill="none">
    <line x1="80" y1="0" x2="80" y2="512"/>
    <line x1="170" y1="0" x2="170" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="342" y1="0" x2="342" y2="512"/>
    <line x1="432" y1="0" x2="432" y2="512"/>
    <line x1="0" y1="80" x2="512" y2="80"/>
    <line x1="0" y1="170" x2="512" y2="170"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="342" x2="512" y2="342"/>
    <line x1="0" y1="432" x2="512" y2="432"/>
  </g>

  <!-- Glow at convergence point -->
  <circle cx="340" cy="256" r="100" fill="url(#glow)"/>

  <!-- Three flowing streams converging from left to right -->
  <!-- Top stream (cyan) -->
  <path d="M 70 140 C 160 140, 200 180, 250 210 C 300 240, 330 250, 380 256"
        stroke="url(#s1)" stroke-width="18" fill="none" stroke-linecap="round" opacity="0.9"/>

  <!-- Middle stream (blue) -->
  <path d="M 70 256 C 140 256, 200 256, 250 256 C 300 256, 330 256, 380 256"
        stroke="url(#s3)" stroke-width="22" fill="none" stroke-linecap="round" opacity="0.9"/>

  <!-- Bottom stream (purple) -->
  <path d="M 70 372 C 160 372, 200 332, 250 302 C 300 272, 330 262, 380 256"
        stroke="url(#s2)" stroke-width="18" fill="none" stroke-linecap="round" opacity="0.9"/>

  <!-- Convergence point — bright dot -->
  <circle cx="388" cy="256" r="14" fill="url(#dot)" opacity="0.95"/>

  <!-- Small trailing glow after convergence -->
  <path d="M 402 256 L 440 256" stroke="#06b6d4" stroke-width="6" stroke-linecap="round" opacity="0.4"/>
</svg>
